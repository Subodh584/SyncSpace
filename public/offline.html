<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <title>Offline — SyncSpace</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 50% 0%, #131a30 0%, #0a0f1d 60%);
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) 24px
          max(24px, env(safe-area-inset-bottom));
        text-align: center;
      }
      .card { max-width: 22rem; }
      .icon {
        width: 88px;
        height: 88px;
        margin: 0 auto 1.5rem;
        border-radius: 24px;
        display: block;
        box-shadow: 0 20px 45px -15px rgba(79, 70, 229, 0.7);
      }
      h1 { font-size: 1.4rem; margin: 0 0 0.5rem; color: #fff; }
      p { margin: 0 0 1.75rem; line-height: 1.6; color: #9ca3af; font-size: 0.95rem; }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: #4f46e5;
        padding: 0.75rem 1.5rem;
        border-radius: 0.75rem;
        transition: background 0.15s ease, transform 0.15s ease;
      }
      button:hover { background: #4338ca; }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="icon" src="/icon-192.png" alt="SyncSpace" width="88" height="88" />
      <h1>You're offline</h1>
      <p>
        SyncSpace needs a connection to load your workspaces. Check your network
        and try again.
      </p>
      <button type="button" onclick="location.reload()">Retry</button>
    </main>
    <script>
      // Auto-retry the moment the connection comes back.
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
